resources:
  jobs:
    calibration_batch:
      name: "[${bundle.target}] Airport DT - Calibration Batch (132 sims)"
      description: "33 airports x 4 runs each (3 normal + 1 weather), 36h duration, calibrated profiles"

      tasks:
        - task_key: cal_sfo_normal_d1
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "SFO"
              arrivals: "500"
              departures: "500"
              duration_hours: "36"
              time_step_seconds: "2.0"
              seed: "100"
              output_file: "simulation_output/calibrated/cal_sfo_normal_d1.json"

        - task_key: cal_sfo_normal_d2
