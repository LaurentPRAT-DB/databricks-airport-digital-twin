resources:
  jobs:
    unit_test:
      name: "[${bundle.target}] Airport DT - Python Unit Tests"
      description: "Runs pytest backend unit tests on serverless compute"

      environments:
        - environment_key: test_env
          spec:
            client: "1"
            dependencies:
              - fastapi==0.135.2
              - uvicorn==0.42.0
              - websockets==16.0
              - pydantic==2.12.5
              - starlette==1.0.0
              - python-dotenv==1.2.2
              - httpx==0.28.1
              - requests==2.32.5
              - tenacity==9.1.4
              - circuitbreaker==2.1.3
              - Faker==40.11.1
              - databricks-sql-connector==4.2.5
              - psycopg2-binary==2.9.11
              - databricks-sdk==0.102.0
              - openap==2.5.0
              - pyyaml==6.0.2

      tasks:
        - task_key: run_pytest
          notebook_task:
            notebook_path: ../databricks/notebooks/test_unit_tests.py
          environment_key: test_env

      tags:
        project: airport-digital-twin
        component: unit-test
        target: ${bundle.target}

      timeout_seconds: 600
