resources:
  jobs:
    # ── Simulation Batch 1/3: airports ams→dtw (11 airports) ──────────
    simulation_batch_1:
      name: "[${bundle.target}] Airport DT - Simulation Batch 1/3"
      description: "Runs airports 1-11 (ams→dtw) 7-day simulations on isolated serverless compute"

      tasks:
        - task_key: list_configs
          notebook_task:
            notebook_path: ../databricks/notebooks/list_simulation_configs.py
            base_parameters:
              batch: "1"
              total_batches: "3"

        - task_key: run_simulations
          for_each_task:
            inputs: "{{tasks.list_configs.values.configs}}"
            task:
              task_key: run_single_sim
              notebook_task:
                notebook_path: ../databricks/notebooks/run_simulation_airport.py
                base_parameters:
                  config_file: "{{input}}"
          depends_on:
            - task_key: list_configs

      tags:
        project: airport-digital-twin
        component: simulation
        batch: "1"
        target: ${bundle.target}

      timeout_seconds: 21600  # 6 hours

    # ── Simulation Batch 2/3: airports dxb→msp (11 airports) ──────────
    simulation_batch_2:
      name: "[${bundle.target}] Airport DT - Simulation Batch 2/3"
      description: "Runs airports 12-22 (dxb→msp) 7-day simulations on isolated serverless compute"

      tasks:
        - task_key: list_configs
          notebook_task:
            notebook_path: ../databricks/notebooks/list_simulation_configs.py
            base_parameters:
              batch: "2"
              total_batches: "3"

        - task_key: run_simulations
          for_each_task:
            inputs: "{{tasks.list_configs.values.configs}}"
            task:
              task_key: run_single_sim
              notebook_task:
                notebook_path: ../databricks/notebooks/run_simulation_airport.py
                base_parameters:
                  config_file: "{{input}}"
          depends_on:
            - task_key: list_configs

      tags:
        project: airport-digital-twin
        component: simulation
        batch: "2"
        target: ${bundle.target}

      timeout_seconds: 21600  # 6 hours

    # ── Simulation Batch 3/3: airports nrt→syd (11 airports) ──────────
    simulation_batch_3:
      name: "[${bundle.target}] Airport DT - Simulation Batch 3/3"
      description: "Runs airports 23-33 (nrt→syd) 7-day simulations on isolated serverless compute"

      tasks:
        - task_key: list_configs
          notebook_task:
            notebook_path: ../databricks/notebooks/list_simulation_configs.py
            base_parameters:
              batch: "3"
              total_batches: "3"

        - task_key: run_simulations
          for_each_task:
            inputs: "{{tasks.list_configs.values.configs}}"
            task:
              task_key: run_single_sim
              notebook_task:
                notebook_path: ../databricks/notebooks/run_simulation_airport.py
                base_parameters:
                  config_file: "{{input}}"
          depends_on:
            - task_key: list_configs

      tags:
        project: airport-digital-twin
        component: simulation
        batch: "3"
        target: ${bundle.target}

      timeout_seconds: 21600  # 6 hours

    # ── Analysis + Training (run after all 3 batches complete) ────────
    simulation_train:
      name: "[${bundle.target}] Airport DT - Simulation Analysis & Training"
      description: "Analyzes simulation results from UC Volume and trains turnaround + OBT models. Run after all 3 simulation batches complete."

      environments:
        - environment_key: sim_env
          spec:
            client: "1"
            dependencies:
              - scikit-learn
              - catboost>=1.2
              - pyyaml
              - pydantic

      tasks:
        - task_key: analyze_results
          notebook_task:
            notebook_path: ../databricks/notebooks/analyze_simulations.py

        - task_key: train_turnaround_model
          notebook_task:
            notebook_path: ../databricks/notebooks/train_turnaround_model.py
          environment_key: sim_env
          run_if: ALL_DONE
          depends_on:
            - task_key: analyze_results

        - task_key: train_obt_model
          notebook_task:
            notebook_path: ../databricks/notebooks/train_obt_model.py
          environment_key: sim_env
          run_if: ALL_DONE
          depends_on:
            - task_key: analyze_results

      tags:
        project: airport-digital-twin
        component: ml-training
        target: ${bundle.target}

      timeout_seconds: 14400  # 4 hours
