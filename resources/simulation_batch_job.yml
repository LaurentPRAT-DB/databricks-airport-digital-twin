        - task_key: sim_nrt
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "NRT"
              config_file: "configs/simulation_nrt_7day.yaml"

        - task_key: sim_sin
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "SIN"
