        - task_key: sim_cdg
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "CDG"
              config_file: "configs/simulation_cdg_7day.yaml"

        - task_key: sim_fra
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "FRA"
              config_file: "configs/simulation_fra_7day.yaml"

        - task_key: sim_ams
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "AMS"
              config_file: "configs/simulation_ams_7day.yaml"

        - task_key: sim_syd
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "SYD"
              config_file: "configs/simulation_syd_7day.yaml"

        - task_key: sim_icn
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "ICN"
              config_file: "configs/simulation_icn_7day.yaml"

        - task_key: sim_gru
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "GRU"
              config_file: "configs/simulation_gru_7day.yaml"

        - task_key: sim_jnb
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "JNB"
              config_file: "configs/simulation_jnb_7day.yaml"

        # ── Analysis task (depends on all 33 simulations) ──────────────
        - task_key: analyze_results
          notebook_task:
            notebook_path: ../databricks/notebooks/analyze_simulations.py
          depends_on:
            - task_key: sim_sfo
            - task_key: sim_jfk
            - task_key: sim_atl
            - task_key: sim_ord
            - task_key: sim_lax
            - task_key: sim_dfw
            - task_key: sim_den
            - task_key: sim_sea
            - task_key: sim_mia
            - task_key: sim_ewr
            - task_key: sim_bos
            - task_key: sim_phx
            - task_key: sim_las
            - task_key: sim_mco
            - task_key: sim_clt
            - task_key: sim_msp
            - task_key: sim_dtw
            - task_key: sim_phl
            - task_key: sim_iah
            - task_key: sim_san
            - task_key: sim_pdx
            - task_key: sim_lhr
            - task_key: sim_dxb
            - task_key: sim_nrt
            - task_key: sim_sin
            - task_key: sim_hkg
            - task_key: sim_cdg
            - task_key: sim_fra
            - task_key: sim_ams
            - task_key: sim_syd
            - task_key: sim_icn
            - task_key: sim_gru
            - task_key: sim_jnb

        # ── OBT model training (depends on all simulations) ──────────────
        - task_key: train_obt_model
          notebook_task:
            notebook_path: ../databricks/notebooks/train_obt_model.py
          environment_key: sim_env
          depends_on:
            - task_key: analyze_results

      tags:
        project: airport-digital-twin
        component: simulation
        target: ${bundle.target}

      timeout_seconds: 28800  # 8 hours for 33 x 7-day sims + training
