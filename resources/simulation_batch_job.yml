resources:
  jobs:
    simulation_batch:
      name: "[${bundle.target}] Airport DT - Multi-Airport Simulation Batch"
      description: "Runs 33 airport simulations sequentially in a single task, then analyzes results and trains OBT v3 model"

      environments:
        - environment_key: sim_env
          spec:
            client: "1"
            dependencies:
              - scikit-learn
              - catboost>=1.2
              - pyyaml
              - pydantic

      tasks:
        # ── Single task runs all 33 simulations sequentially ──────────────
        - task_key: run_all_sims
          notebook_task:
            notebook_path: ../databricks/notebooks/run_all_simulations.py

        # ── Analysis task ──────────────
        - task_key: analyze_results
          notebook_task:
            notebook_path: ../databricks/notebooks/analyze_simulations.py
          depends_on:
            - task_key: run_all_sims

        # ── OBT model training ──────────────
        - task_key: train_obt_model
          notebook_task:
            notebook_path: ../databricks/notebooks/train_obt_model.py
          environment_key: sim_env
          depends_on:
            - task_key: analyze_results

      tags:
        project: airport-digital-twin
        component: simulation
        target: ${bundle.target}

      timeout_seconds: 43200  # 12 hours for 33 sequential sims + analysis + training
