resources:
  jobs:
    simulation_batch:
      name: "[${bundle.target}] Airport DT - Multi-Airport Simulation Batch"
      description: "Runs 33 airport simulations in parallel (7-day, 1000 flights/day each) with region-appropriate weather, then analyzes results and trains OBT model"

      environments:
        - environment_key: sim_env
          spec:
            client: "1"
            dependencies:
              - scikit-learn
              - catboost>=1.2
              - pyyaml
              - pydantic

      tasks:
        # ── 33 parallel simulation tasks (all known-profile airports) ──────
        # US domestic airports
        - task_key: sim_sfo
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "SFO"
              config_file: "configs/simulation_sfo_7day.yaml"

        - task_key: sim_jfk
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "JFK"
              config_file: "configs/simulation_jfk_7day.yaml"

        - task_key: sim_atl
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "ATL"
              config_file: "configs/simulation_atl_7day.yaml"

        - task_key: sim_ord
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "ORD"
              config_file: "configs/simulation_ord_7day.yaml"

        - task_key: sim_lax
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "LAX"
              config_file: "configs/simulation_lax_7day.yaml"

        - task_key: sim_dfw
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "DFW"
              config_file: "configs/simulation_dfw_7day.yaml"

        - task_key: sim_den
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "DEN"
              config_file: "configs/simulation_den_7day.yaml"

        - task_key: sim_sea
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "SEA"
              config_file: "configs/simulation_sea_7day.yaml"

        - task_key: sim_mia
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "MIA"
              config_file: "configs/simulation_mia_7day.yaml"

        - task_key: sim_ewr
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "EWR"
