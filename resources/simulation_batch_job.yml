            base_parameters:
              airport: "LHR"
              config_file: "configs/simulation_lhr_7day.yaml"

        - task_key: sim_dxb
          notebook_task:
            notebook_path: ../databricks/notebooks/run_simulation_airport.py
            base_parameters:
              airport: "DXB"
