resources:
  apps:
    airport_digital_twin:
      name: airport-digital-twin-${bundle.target}
      description: "Airport Digital Twin - Real-time flight visualization"
      source_code_path: ..
      config:
        env:
          - name: DATABRICKS_HTTP_PATH
            value: "/sql/1.0/warehouses/${var.warehouse_id}"
          - name: DATABRICKS_CATALOG
            value: "${var.catalog}"
          - name: DATABRICKS_SCHEMA
            value: "${var.schema}"
          - name: DATABRICKS_WAREHOUSE_ID
            value: "${var.warehouse_id}"
          - name: LAKEBASE_HOST
            value: "${var.lakebase_host}"
          - name: LAKEBASE_ENDPOINT_NAME
            value: "projects/airport-digital-twin/branches/${var.lakebase_branch}/endpoints/primary"
          - name: INPAINTING_ENDPOINT_NAME
            value: "${var.inpainting_endpoint_name}"
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
