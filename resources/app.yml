resources:
  apps:
    airport_digital_twin:
      name: airport-digital-twin-${bundle.target}
      description: "Airport Digital Twin - Real-time flight visualization"
      source_code_path: ..
      config:
        env:
          - name: LAKEBASE_HOST
            value: "${var.lakebase_host}"
          - name: LAKEBASE_ENDPOINT_NAME
            value: "projects/airport-digital-twin/branches/${var.lakebase_branch}/endpoints/primary"
          - name: INPAINTING_ENDPOINT_NAME
            value: "airport-dt-aircraft-inpainting-${bundle.target}"
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: inpainting-endpoint
          serving_endpoint:
            name: airport-dt-aircraft-inpainting-${bundle.target}
            permission: CAN_QUERY
