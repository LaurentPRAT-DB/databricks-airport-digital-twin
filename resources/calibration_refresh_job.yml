resources:
  jobs:
    calibration_refresh:
      name: "airport-dt-calibration-refresh"
      description: "Weekly refresh of airport calibration profiles from BTS OTP + OurAirports data"

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"  # Every Monday at 06:00 UTC
        timezone_id: "UTC"

      tasks:
        - task_key: refresh_data
          description: "Download latest data and rebuild all airport profiles"
          notebook_task:
            notebook_path: "databricks/notebooks/refresh_calibration_data.py"
          environment_key: default

        - task_key: validate_quality
          description: "Run realism scorecard to verify profile quality"
          depends_on:
            - task_key: refresh_data
          notebook_task:
            notebook_path: "databricks/notebooks/realism_scorecard.py"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - catboost
              - scikit-learn
