    duration_hours: 2.0
    visibility_nm: 8.0
    ceiling_ft: 4500
    wind_speed_kt: 10
    wind_direction: 240

runway_events:
  - time: "14:00"
    type: closure
    runway: "28R"
    duration_minutes: 90
    reason: Runway flooding from heavy rain

  - time: "14:30"
    type: closure
    runway: "28L"
    duration_minutes: 60
    reason: Lightning within 5nm — ground stop

ground_events:
  - time: "13:00"
    type: gate_failure
    target: "T3-E12"
    duration_hours: 3.0

  - time: "14:00"
    type: taxiway_closure
    target: "Taxiway C (flooding)"
    duration_hours: 2.5
    impact:
      turnaround_multiplier: 1.4

  - time: "20:00"
    type: fuel_shortage
    duration_hours: 2.0
    impact:
      turnaround_multiplier: 1.2

traffic_modifiers:
  - time: "11:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "15:00"
    type: diversion
    extra_arrivals: 6
    diversion_origin: CGH
