name: GRU Tropical Convective Storm — South Atlantic
description: >
  Intense tropical convective activity over Sao Paulo metro area.
  Rapid-onset cumulonimbus development in the afternoon heat, with
  microbursts and heavy rain causing runway flooding. Lightning
  forces ground stop. Common summer pattern (Dec-Mar) at Guarulhos.
  Recovery complicated by secondary cells forming after sunset.

weather_events:
  - time: "12:00"
    type: thunderstorm
    severity: light
    duration_hours: 1.5
    visibility_nm: 4.0
    ceiling_ft: 2500
    wind_speed_kt: 15
    wind_gusts_kt: 25
    wind_direction: 350

  - time: "13:30"
    type: thunderstorm
    severity: severe
    duration_hours: 2.5
    visibility_nm: 0.5
    ceiling_ft: 400
    wind_speed_kt: 30
    wind_gusts_kt: 55
    wind_direction: 310

  - time: "16:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 1.5
    ceiling_ft: 1000
    wind_speed_kt: 20
    wind_gusts_kt: 35
    wind_direction: 280

  - time: "17:30"
    type: clear
    severity: light
    duration_hours: 2.5
    visibility_nm: 6.0
    ceiling_ft: 3500
    wind_speed_kt: 12
    wind_direction: 270

  - time: "20:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.0
    ceiling_ft: 800
    wind_speed_kt: 22
