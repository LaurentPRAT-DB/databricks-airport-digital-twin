  - time: "06:00"
    type: snow
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 1.0
    ceiling_ft: 600
    wind_speed_kt: 22
    wind_gusts_kt: 35
    wind_direction: 350

  - time: "09:00"
    type: snow
    severity: severe
    duration_hours: 5.0
    visibility_nm: 0.12
    ceiling_ft: 100
    wind_speed_kt: 30
    wind_gusts_kt: 45
    wind_direction: 340

