name: PHL Summer Severe Thunderstorm — US Mid-Atlantic
description: >
  Summer squall line moves through the Delaware Valley with severe
  thunderstorms, large hail, and damaging wind gusts. PHL's close
  proximity to EWR and JFK means coordinated flow control across
  the NY/PHL metroplex. Realistic for Jun-Aug.

weather_events:
  - time: "15:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 3.0
    ceiling_ft: 2000
    wind_speed_kt: 22
    wind_gusts_kt: 35
    wind_direction: 250

  - time: "16:30"
    type: thunderstorm
    severity: severe
    duration_hours: 2.0
    visibility_nm: 0.5
    ceiling_ft: 400
    wind_speed_kt: 42
    wind_gusts_kt: 60
    wind_direction: 270

  - time: "18:30"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 2.0
    ceiling_ft: 1200
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 280

  - time: "20:00"
    type: clear
    severity: light
    duration_hours: 4.0
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 10
    wind_direction: 290

runway_events:
  - time: "16:30"
    type: closure
    runway: "27L"
    duration_minutes: 120
    reason: Severe thunderstorm — wind shear

  - time: "17:00"
    type: closure
    runway: "27R"
    duration_minutes: 90
    reason: Hail on runway

ground_events:
  - time: "16:30"
    type: gate_failure
    target: "Terminal F-28"
    duration_hours: 3.0

  - time: "17:00"
    type: taxiway_closure
    target: "Taxiway K (hail/debris)"
    duration_hours: 2.5
    impact:
      turnaround_multiplier: 1.4

traffic_modifiers:
  - time: "16:00"
    type: ground_stop
    duration_hours: 2.0

  - time: "18:30"
    type: diversion
    extra_arrivals: 6
    diversion_origin: EWR
