name: CDG Winter Fog + Freezing Rain — Northern France
description: >
  Radiation fog blankets the Paris basin overnight, then a warm front
  brings freezing drizzle. CDG's massive dual-terminal operation
  grinds to a halt under CAT IIIb restrictions. De-icing queues
  build across all four runways. Realistic for Nov-Feb.

weather_events:
  - time: "03:00"
    type: fog
    severity: severe
    duration_hours: 3.0
    visibility_nm: 0.12
    ceiling_ft: 50
    wind_speed_kt: 3
    wind_direction: 180

  - time: "06:00"
    type: fog
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 0.5
    ceiling_ft: 200
    wind_speed_kt: 5
    wind_direction: 190

  - time: "08:00"
    type: freezing_rain
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 1.0
    ceiling_ft: 400
    wind_speed_kt: 10
    wind_direction: 200

  - time: "11:00"
    type: freezing_rain
    severity: light
    duration_hours: 2.0
    visibility_nm: 2.0
    ceiling_ft: 1000
    wind_speed_kt: 12
    wind_direction: 220

  - time: "13:00"
    type: rain
    severity: light
    duration_hours: 3.0
    visibility_nm: 4.0
    ceiling_ft: 2000
    wind_speed_kt: 15
    wind_direction: 240

  - time: "16:00"
    type: clear
    severity: light
    duration_hours: 8.0
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 8
    wind_direction: 260

runway_events:
  - time: "03:00"
    type: config_change
    runway_config: "27R_only"
    duration_minutes: 300
    reason: CAT IIIb fog — single runway autoland only

  - time: "08:00"
    type: closure
    runway: "27L"
    duration_minutes: 180
    reason: Freezing rain — ice on runway

ground_events:
  - time: "06:00"
    type: deicing_required
    duration_hours: 8.0
    impact:
      turnaround_multiplier: 1.7

  - time: "04:00"
    type: gate_failure
    target: "Terminal 2E-K46"
    duration_hours: 5.0

  - time: "08:00"
    type: taxiway_closure
    target: "Taxiway Y (ice)"
    duration_hours: 4.0
    impact:
      turnaround_multiplier: 1.4

traffic_modifiers:
  - time: "04:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "09:00"
    type: diversion
    extra_arrivals: 10
    diversion_origin: ORY
