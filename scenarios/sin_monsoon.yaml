name: SIN Southwest Monsoon — Equatorial Squall Line
description: >
  Classic southwest monsoon season squall line over Singapore Changi.
  Morning convective build-up with embedded cumulonimbus, heavy tropical
  downpour mid-afternoon reducing visibility to near-zero. Brief clearing
  before secondary line develops at sunset. High humidity throughout with
  temperature ~32C. Realistic for Jun-Sep SW monsoon season.

weather_events:
  - time: "08:00"
    type: rain
    severity: light
    duration_hours: 2.0
    visibility_nm: 4.0
    ceiling_ft: 2500
    wind_speed_kt: 12
    wind_direction: 220

  - time: "10:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.5
    ceiling_ft: 1000
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 240

  - time: "12:00"
    type: thunderstorm
    severity: severe
    duration_hours: 2.5
    visibility_nm: 0.3
    ceiling_ft: 200
    wind_speed_kt: 35
    wind_gusts_kt: 55
    wind_direction: 250

  - time: "14:30"
    type: rain
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 2.0
    ceiling_ft: 1200
    wind_speed_kt: 18
    wind_gusts_kt: 30
    wind_direction: 230

  - time: "16:00"
    type: clear
    severity: light
    duration_hours: 2.0
    visibility_nm: 6.0
    ceiling_ft: 3500
    wind_speed_kt: 10
    wind_direction: 210

  - time: "18:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.0
    ceiling_ft: 800
    wind_speed_kt: 28
    wind_gusts_kt: 42
    wind_direction: 260

  - time: "20:00"
    type: clear
    severity: light
    duration_hours: 4.0
    visibility_nm: 8.0
    ceiling_ft: 5000
    wind_speed_kt: 8
    wind_direction: 200

runway_events:
  - time: "12:30"
    type: closure
    runway: "28L"
    duration_minutes: 120
    reason: Thunderstorm cell over final approach — windshear reported

  - time: "13:00"
    type: closure
    runway: "28R"
    duration_minutes: 90
    reason: Heavy rain — water accumulation on runway

ground_events:
  - time: "11:00"
    type: gate_failure
    target: "T3-C15"
    duration_hours: 3.0

  - time: "12:00"
    type: taxiway_closure
    target: "Taxiway W (standing water)"
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.4

  - time: "18:30"
    type: gate_failure
    target: "T1-D8"
    duration_hours: 2.0

traffic_modifiers:
  - time: "07:00"
    type: surge
    extra_arrivals: 10
    extra_departures: 8

  - time: "14:00"
    type: diversion
    extra_arrivals: 6
    diversion_origin: KUL
