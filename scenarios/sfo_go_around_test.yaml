name: SFO Go-Around Test — Runway Busy Forces Missed Approach
description: >
  Short scenario designed to force go-arounds. Closes ALL arrival runways
  (28R and 28L) during the approach window (01:00-01:20) so arriving aircraft
  encounter busy runways with no alternates available, forcing missed approach
  procedures. Strong gusts further increase go-around probability.

weather_events:
  - time: "00:05"
    type: wind_shift
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 3.0
    ceiling_ft: 1200
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 250

runway_events:
  - time: "00:30"
    type: closure
    runway: "28R"
    duration_minutes: 20
    reason: "runway inspection — forces go-around for arriving traffic"

  - time: "00:30"
    type: closure
    runway: "28L"
    duration_minutes: 20
    reason: "runway inspection — forces go-around for arriving traffic"

  - time: "00:50"
    type: reopen
    runway: "28R"

  - time: "00:50"
    type: reopen
    runway: "28L"
