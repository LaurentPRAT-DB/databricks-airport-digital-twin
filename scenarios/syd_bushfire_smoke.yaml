name: SYD Bushfire Smoke + Sea Breeze Convergence
description: >
  Western Sydney bushfire sends dense smoke plume over the airport.
  Visibility degrades through the morning as smoke accumulates under
  a temperature inversion. Afternoon sea breeze convergence triggers
  thunderstorm activity embedded in the smoke layer. Sydney's curfew
  (23:00-06:00) adds pressure to clear the backlog before shutdown.
  Realistic for Nov-Feb bushfire season.

weather_events:
  - time: "07:00"
    type: smoke
    severity: light
    duration_hours: 2.0
    visibility_nm: 3.0
    ceiling_ft: 2000
    wind_speed_kt: 8
    wind_direction: 270

  - time: "09:00"
    type: smoke
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 1.0
    ceiling_ft: 800
    wind_speed_kt: 10
    wind_direction: 290

  - time: "12:00"
    type: smoke
    severity: severe
    duration_hours: 2.0
    visibility_nm: 0.5
    ceiling_ft: 300
    wind_speed_kt: 12
    wind_direction: 310

  - time: "14:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.5
    ceiling_ft: 1000
    wind_speed_kt: 22
    wind_gusts_kt: 38
    wind_direction: 180

  - time: "16:00"
    type: clear
    severity: light
    duration_hours: 2.0
    visibility_nm: 4.0
    ceiling_ft: 2500
    wind_speed_kt: 15
    wind_direction: 160

  - time: "18:00"
    type: clear
    severity: light
    duration_hours: 5.0
    visibility_nm: 8.0
    ceiling_ft: 5000
    wind_speed_kt: 10
    wind_direction: 200

runway_events:
  - time: "12:00"
    type: closure
    runway: "28R"
    duration_minutes: 120
    reason: Visibility below CAT I minimums in smoke

  - time: "14:30"
    type: closure
    runway: "28L"
    duration_minutes: 45
    reason: Windshear on final from sea breeze front

ground_events:
  - time: "10:00"
    type: gate_failure
    target: "T1-D8"
    duration_hours: 3.0

  - time: "11:00"
    type: taxiway_closure
    target: "Taxiway B (smoke visibility)"
    duration_hours: 4.0
    impact:
      turnaround_multiplier: 1.3

  - time: "15:00"
    type: fuel_shortage
    duration_hours: 2.0
    impact:
      turnaround_multiplier: 1.2

curfew_events:
  - start: "23:00"
    end: "06:00"
    max_arrivals_per_hour: 2

traffic_modifiers:
  - time: "06:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "13:00"
    type: diversion
    extra_arrivals: 5
    diversion_origin: MEL
