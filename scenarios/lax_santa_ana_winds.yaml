name: LAX Santa Ana Wind Event — Southern California
description: >
  Strong Santa Ana winds blast through the LA basin with gusts
  exceeding 60kt. Extreme turbulence on approach over the mountains.
  Offshore flow clears marine layer but creates severe mechanical
  turbulence. Wildfire smoke may reduce visibility. Realistic for Oct-Mar.

weather_events:
  - time: "02:00"
    type: wind_shift
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 6.0
    ceiling_ft: 8000
    wind_speed_kt: 30
    wind_gusts_kt: 48
    wind_direction: 060

  - time: "06:00"
    type: wind_shift
    severity: severe
    duration_hours: 6.0
    visibility_nm: 4.0
    ceiling_ft: 6000
    wind_speed_kt: 45
    wind_gusts_kt: 65
    wind_direction: 050

  - time: "12:00"
    type: haze
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 3.0
    ceiling_ft: 5000
    wind_speed_kt: 35
    wind_gusts_kt: 55
    wind_direction: 060

  - time: "16:00"
    type: wind_shift
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 5.0
    ceiling_ft: 6000
    wind_speed_kt: 25
    wind_gusts_kt: 42
    wind_direction: 070

  - time: "20:00"
    type: clear
    severity: light
    duration_hours: 4.0
    visibility_nm: 10.0
    ceiling_ft: 8000
    wind_speed_kt: 15
    wind_direction: 080

runway_events:
  - time: "06:00"
    type: config_change
    runway_config: "24L_24R_westerly"
    duration_minutes: 480
    reason: Santa Ana easterly flow forces westbound operations

  - time: "08:00"
    type: closure
    runway: "24L"
    duration_minutes: 120
    reason: Wind shear reports exceed approach limits

ground_events:
  - time: "06:00"
    type: gate_failure
    target: "TBIT-148"
    duration_hours: 4.0

  - time: "10:00"
    type: taxiway_closure
    target: "Taxiway AA (debris)"
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.3

traffic_modifiers:
  - time: "06:00"
    type: surge
    extra_arrivals: 6
    extra_departures: 4

  - time: "09:00"
    type: diversion
    extra_arrivals: 8
    diversion_origin: BUR
