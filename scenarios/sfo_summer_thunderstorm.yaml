name: SFO Summer Thunderstorm + Cascading Disruptions
description: >
  Full-day stress scenario for SFO with 1000 flights.
  Morning gate failure + taxiway closure, midday OAK diversions,
  afternoon thunderstorm reducing arrival rate by 40%, evening fog
  triggering CAT III single-runway ops. Tests cascading delay propagation.

weather_events:
  - time: "14:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 2.5
    visibility_nm: 1.5
    ceiling_ft: 800
    wind_speed_kt: 22
    wind_gusts_kt: 35
    wind_direction: 240

  - time: "18:00"
    type: fog
    severity: severe
    duration_hours: 3.0
    visibility_nm: 0.5
    ceiling_ft: 200
    wind_speed_kt: 5
    wind_direction: 280

  - time: "21:00"
    type: clear
    severity: light
    duration_hours: 3.0
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 10
    wind_direction: 280

runway_events:
  - time: "10:30"
    type: closure
    runway: "28R"
    duration_minutes: 45
    reason: FOD on runway

  - time: "16:00"
    type: config_change
    runway_config: "28L,28R"
    duration_minutes: 60
    reason: Wind shift requires runway change

ground_events:
  - time: "09:00"
    type: gate_failure
    target: "A7"
    duration_hours: 4.0
    impact:
      turnaround_multiplier: 1.1

  - time: "12:00"
    type: taxiway_closure
    target: "Taxiway A (A1-A5)"
    duration_hours: 2.0
    impact:
      turnaround_multiplier: 1.2

  - time: "15:00"
    type: fuel_shortage
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.3

traffic_modifiers:
  - time: "06:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 7

  - time: "08:00"
    type: surge
    extra_arrivals: 7

  - time: "11:00"
    type: diversion
    extra_arrivals: 8
    diversion_origin: OAK
