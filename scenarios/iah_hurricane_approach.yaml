name: IAH Gulf Hurricane Approach — Texas Gulf Coast
description: >
  Category 2 hurricane approaches the Texas coast. Outer bands bring
  heavy rain and gusty winds hours before landfall. Flooding shuts
  down ground access roads. Airlines preemptively cancel flights.
  Realistic for Jun-Nov hurricane season.

weather_events:
  - time: "06:00"
    type: rain
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 3.0
    ceiling_ft: 1500
    wind_speed_kt: 25
    wind_gusts_kt: 38
    wind_direction: 120

  - time: "09:00"
    type: rain
    severity: severe
    duration_hours: 4.0
    visibility_nm: 0.5
    ceiling_ft: 300
    wind_speed_kt: 45
    wind_gusts_kt: 65
    wind_direction: 140

  - time: "13:00"
    type: thunderstorm
    severity: severe
    duration_hours: 4.0
    visibility_nm: 0.25
    ceiling_ft: 200
    wind_speed_kt: 55
    wind_gusts_kt: 78
    wind_direction: 160

  - time: "17:00"
    type: rain
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 1.0
    ceiling_ft: 500
    wind_speed_kt: 35
    wind_gusts_kt: 50
    wind_direction: 180

  - time: "21:00"
    type: rain
    severity: light
    duration_hours: 3.0
    visibility_nm: 3.0
    ceiling_ft: 1500
    wind_speed_kt: 20
    wind_direction: 200

runway_events:
  - time: "09:00"
    type: closure
    runway: "26L"
    duration_minutes: 360
    reason: Hurricane approach — runway flooding

  - time: "10:00"
    type: closure
    runway: "26R"
    duration_minutes: 300
    reason: Wind exceeds crosswind limits

ground_events:
  - time: "08:00"
    type: taxiway_closure
    target: "Taxiway WA (flooding)"
    duration_hours: 10.0
    impact:
      turnaround_multiplier: 1.8

  - time: "10:00"
    type: gate_failure
    target: "Terminal C-34"
    duration_hours: 8.0

  - time: "12:00"
    type: fuel_shortage
    duration_hours: 6.0
    impact:
      turnaround_multiplier: 1.5

traffic_modifiers:
  - time: "08:00"
    type: ground_stop
    duration_hours: 8.0

  - time: "10:00"
    type: diversion
    extra_arrivals: 15
    diversion_origin: HOU
