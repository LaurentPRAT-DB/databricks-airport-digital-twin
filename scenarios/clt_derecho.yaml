name: CLT Summer Derecho — US Southeast
description: >
  A fast-moving derecho (widespread windstorm) sweeps across the
  Carolinas. Sustained winds exceed 50kt with gusts to 75kt.
  Power outages affect terminal systems. Quick onset and passage
  but devastating ground impact. Realistic for Jun-Aug.

weather_events:
  - time: "14:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.0
    visibility_nm: 3.0
    ceiling_ft: 2000
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 270

  - time: "15:00"
    type: thunderstorm
    severity: severe
    duration_hours: 2.0
    visibility_nm: 0.25
    ceiling_ft: 300
    wind_speed_kt: 55
    wind_gusts_kt: 75
    wind_direction: 280

  - time: "17:00"
    type: rain
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 2.0
    ceiling_ft: 1500
    wind_speed_kt: 30
    wind_gusts_kt: 45
    wind_direction: 290

  - time: "19:00"
    type: clear
    severity: light
    duration_hours: 5.0
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 12
    wind_direction: 300

runway_events:
  - time: "15:00"
    type: closure
    runway: "18C"
    duration_minutes: 150
    reason: Derecho wind damage — debris on runway

  - time: "15:30"
    type: closure
    runway: "18L"
    duration_minutes: 120
    reason: Wind shear exceeds limits

ground_events:
  - time: "15:00"
    type: gate_failure
    target: "Concourse B-12"
    duration_hours: 5.0

  - time: "15:00"
    type: gate_failure
    target: "Concourse E-8"
    duration_hours: 4.0

  - time: "16:00"
    type: taxiway_closure
    target: "Taxiway D (debris)"
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.6

traffic_modifiers:
  - time: "15:00"
    type: ground_stop
    duration_hours: 2.5

  - time: "17:30"
    type: diversion
    extra_arrivals: 8
    diversion_origin: RDU
