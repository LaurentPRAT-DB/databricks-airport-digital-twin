name: SFO Afternoon Thunderstorm
description: >
  Severe thunderstorm develops during the evening push (14:00-17:00).
  Visibility drops to 1nm, ceiling 800ft, gusts to 45kt.
  Runway 28L closed for 1 hour due to wind shear reports.
  Expect significant delays, holdings, and possible go-arounds.

weather_events:
  - time: "14:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.0
    visibility_nm: 3.0
    ceiling_ft: 1500
    wind_speed_kt: 20
    wind_gusts_kt: 30
    wind_direction: 250

  - time: "15:00"
    type: thunderstorm
    severity: severe
    duration_hours: 1.5
    visibility_nm: 1.0
    ceiling_ft: 800
    wind_speed_kt: 25
    wind_gusts_kt: 45
    wind_direction: 240

  - time: "16:30"
    type: thunderstorm
    severity: moderate
    duration_hours: 0.5
    visibility_nm: 3.0
    ceiling_ft: 2000
    wind_speed_kt: 18
    wind_gusts_kt: 28
    wind_direction: 260

  - time: "17:00"
    type: clear
    severity: light
    duration_hours: 7.0
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 12
    wind_direction: 280

runway_events:
  - time: "15:00"
    type: closure
    runway: "28L"
    duration_minutes: 60
    reason: Wind shear reports on final approach

ground_events:
  - time: "15:30"
    type: deicing_required
    duration_hours: 0.5
    impact:
      turnaround_multiplier: 1.3
