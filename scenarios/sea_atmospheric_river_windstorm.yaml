name: SEA Atmospheric River + Windstorm — Pacific Northwest
description: >
  Powerful atmospheric river makes landfall with an embedded
  extratropical cyclone. Heavy rain and hurricane-force gusts
  to 60kt topple trees and cause power outages. Sea-Tac faces
  extended IFR conditions. Realistic for Oct-Mar.

weather_events:
  - time: "04:00"
    type: rain
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 2.0
    ceiling_ft: 800
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 180

  - time: "07:00"
    type: rain
    severity: severe
    duration_hours: 5.0
    visibility_nm: 0.5
    ceiling_ft: 200
    wind_speed_kt: 45
    wind_gusts_kt: 65
    wind_direction: 190

  - time: "12:00"
    type: rain
    severity: moderate
    duration_hours: 3.0
    visibility_nm: 1.5
    ceiling_ft: 600
    wind_speed_kt: 35
    wind_gusts_kt: 52
    wind_direction: 200

  - time: "15:00"
    type: rain
    severity: light
    duration_hours: 3.0
    visibility_nm: 3.0
    ceiling_ft: 2000
    wind_speed_kt: 22
    wind_gusts_kt: 38
    wind_direction: 210

  - time: "18:00"
    type: clear
    severity: light
    duration_hours: 6.0
    visibility_nm: 8.0
    ceiling_ft: 4000
    wind_speed_kt: 12
    wind_direction: 220

runway_events:
  - time: "07:00"
    type: closure
    runway: "16L"
    duration_minutes: 240
    reason: Windstorm — gusts exceeding 60kt

  - time: "08:00"
    type: closure
    runway: "16R"
    duration_minutes: 180
    reason: Debris on runway from downed trees

ground_events:
  - time: "07:00"
    type: gate_failure
    target: "Concourse A-8"
    duration_hours: 5.0

  - time: "08:00"
    type: taxiway_closure
    target: "Taxiway B (debris/flooding)"
    duration_hours: 6.0
    impact:
      turnaround_multiplier: 1.5

  - time: "10:00"
    type: gate_failure
    target: "Concourse D-4"
    duration_hours: 4.0

traffic_modifiers:
  - time: "07:00"
    type: ground_stop
    duration_hours: 3.0

  - time: "11:00"
    type: diversion
    extra_arrivals: 8
    diversion_origin: PDX
