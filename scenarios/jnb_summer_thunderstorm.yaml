name: JNB Highveld Thunderstorm — Southern Africa
description: >
  Classic Highveld summer afternoon thunderstorm at OR Tambo International.
  Clear hot morning with rapid convective development after midday. Severe
  thunderstorm with hail and microbursts at 15:00. JNB sits at 5,558ft
  elevation causing density altitude performance issues in summer heat (35C).
  Lightning forces ground stop. Secondary cells at sunset before clearing.
  Realistic for Oct-Mar Highveld storm season.

weather_events:
  - time: "06:00"
    type: haze
    severity: light
    duration_hours: 3.0
    visibility_nm: 5.0
    ceiling_ft: 3000
    wind_speed_kt: 5
    wind_direction: 050

  - time: "09:00"
    type: clear
    severity: light
    duration_hours: 3.0
    visibility_nm: 8.0
    ceiling_ft: 8000
    wind_speed_kt: 10
    wind_direction: 360

  - time: "12:00"
    type: thunderstorm
    severity: light
    duration_hours: 1.5
    visibility_nm: 4.0
    ceiling_ft: 2500
    wind_speed_kt: 15
    wind_gusts_kt: 28
    wind_direction: 330

  - time: "13:30"
    type: thunderstorm
    severity: severe
    duration_hours: 2.5
    visibility_nm: 0.5
    ceiling_ft: 300
    wind_speed_kt: 35
    wind_gusts_kt: 55
    wind_direction: 310

  - time: "16:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 1.5
    ceiling_ft: 1000
    wind_speed_kt: 22
    wind_gusts_kt: 38
    wind_direction: 280

  - time: "17:30"
    type: clear
    severity: light
    duration_hours: 2.0
    visibility_nm: 5.0
    ceiling_ft: 3500
    wind_speed_kt: 12
    wind_direction: 260

  - time: "19:30"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 1.0
    ceiling_ft: 800
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 240

  - time: "21:00"
    type: clear
    severity: light
    duration_hours: 3.0
    visibility_nm: 8.0
    ceiling_ft: 5000
    wind_speed_kt: 8
    wind_direction: 220

runway_events:
  - time: "14:00"
    type: closure
    runway: "28L"
    duration_minutes: 120
    reason: Microburst reported on approach — windshear alerts

  - time: "14:30"
    type: closure
    runway: "28R"
    duration_minutes: 90
    reason: Lightning within 5nm — ground stop

ground_events:
  - time: "13:00"
    type: gate_failure
    target: "T-A6"
    duration_hours: 3.0

  - time: "14:00"
    type: taxiway_closure
    target: "Taxiway E (hail damage inspection)"
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.5

  - time: "19:00"
    type: fuel_shortage
    duration_hours: 2.0
    impact:
      turnaround_multiplier: 1.3

traffic_modifiers:
  - time: "06:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "15:00"
    type: diversion
    extra_arrivals: 5
    diversion_origin: CPT

  - time: "14:30"
    type: ground_stop
    duration_hours: 1.5
