name: FRA Winter Crosswind + Freezing Rain — Central Europe
description: >
  Low-pressure system tracks across Germany bringing strong westerly winds,
  freezing rain, and low stratus. FRA operates 4 runways in normal config
  but crosswinds force single-direction ops. Freezing rain creates severe
  de-icing delays. Afternoon wind shift brings brief clearing before
  secondary front arrives at evening. Realistic for Nov-Feb central
  European winter weather.

weather_events:
  - time: "04:00"
    type: freezing_rain
    severity: light
    duration_hours: 2.0
    visibility_nm: 3.0
    ceiling_ft: 1500
    wind_speed_kt: 20
    wind_gusts_kt: 30
    wind_direction: 270

  - time: "06:00"
    type: freezing_rain
    severity: severe
    duration_hours: 3.0
    visibility_nm: 0.75
    ceiling_ft: 400
    wind_speed_kt: 32
    wind_gusts_kt: 48
    wind_direction: 280

  - time: "09:00"
    type: snow
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.5
    ceiling_ft: 800
    wind_speed_kt: 25
    wind_gusts_kt: 38
    wind_direction: 290

  - time: "11:00"
    type: wind_shift
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 3.0
    ceiling_ft: 1800
    wind_speed_kt: 28
    wind_gusts_kt: 42
    wind_direction: 310

  - time: "12:30"
    type: clear
    severity: light
    duration_hours: 4.0
    visibility_nm: 6.0
    ceiling_ft: 3500
    wind_speed_kt: 18
    wind_direction: 320

  - time: "16:30"
    type: snow
    severity: moderate
    duration_hours: 2.5
    visibility_nm: 1.0
    ceiling_ft: 600
    wind_speed_kt: 22
    wind_gusts_kt: 35
    wind_direction: 260

  - time: "19:00"
    type: clear
    severity: light
    duration_hours: 5.0
    visibility_nm: 8.0
    ceiling_ft: 4500
    wind_speed_kt: 15
    wind_direction: 250

runway_events:
  - time: "05:00"
    type: closure
    runway: "28R"
    duration_minutes: 180
    reason: Freezing rain — de-icing runway surface

  - time: "06:30"
    type: closure
    runway: "28L"
    duration_minutes: 120
    reason: Crosswind exceeds limit — single direction ops

  - time: "16:00"
    type: closure
    runway: "28R"
    duration_minutes: 90
    reason: Snow clearance required

ground_events:
  - time: "04:00"
    type: deicing_required
    duration_hours: 10.0
    impact:
      turnaround_multiplier: 1.7

  - time: "06:00"
    type: gate_failure
    target: "T1-B12"
    duration_hours: 4.0

  - time: "08:00"
    type: taxiway_closure
    target: "Taxiway N (ice)"
    duration_hours: 5.0
    impact:
      turnaround_multiplier: 1.4

  - time: "16:00"
    type: fuel_shortage
    duration_hours: 2.0
    impact:
      turnaround_multiplier: 1.2

traffic_modifiers:
  - time: "05:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "08:00"
    type: diversion
    extra_arrivals: 8
    diversion_origin: MUC

  - time: "09:00"
    type: ground_stop
    duration_hours: 2.0
