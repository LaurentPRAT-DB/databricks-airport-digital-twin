name: SAN Marine Layer + Santa Ana Transition — Southern California
description: >
  Morning marine layer brings dense fog to Lindbergh Field, then
  afternoon Santa Ana winds arrive with a dramatic shift. The
  transition between fog and wind creates challenging conditions
  for SAN's single runway. Realistic for Oct-Mar.

weather_events:
  - time: "04:00"
    type: fog
    severity: severe
    duration_hours: 3.0
    visibility_nm: 0.25
    ceiling_ft: 100
    wind_speed_kt: 3
    wind_direction: 270

  - time: "07:00"
    type: fog
    severity: moderate
    duration_hours: 2.0
    visibility_nm: 1.0
    ceiling_ft: 400
    wind_speed_kt: 5
    wind_direction: 280

  - time: "09:00"
    type: fog
    severity: light
    duration_hours: 2.0
    visibility_nm: 3.0
    ceiling_ft: 1200
    wind_speed_kt: 8
    wind_direction: 290

  - time: "11:00"
    type: clear
    severity: light
    duration_hours: 2.0
    visibility_nm: 10.0
    ceiling_ft: 6000
    wind_speed_kt: 10
    wind_direction: 300

  - time: "13:00"
    type: wind_shift
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 6.0
    ceiling_ft: 8000
    wind_speed_kt: 35
    wind_gusts_kt: 52
    wind_direction: 060

  - time: "17:00"
    type: wind_shift
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 5.0
    ceiling_ft: 6000
    wind_speed_kt: 28
    wind_gusts_kt: 42
    wind_direction: 070

  - time: "21:00"
    type: clear
    severity: light
    duration_hours: 3.0
    visibility_nm: 10.0
    ceiling_ft: 8000
    wind_speed_kt: 15
    wind_direction: 080

runway_events:
  - time: "04:00"
    type: config_change
    runway_config: "27_ILS_only"
    duration_minutes: 300
    reason: Dense fog — CAT III ILS required

  - time: "13:00"
    type: config_change
    runway_config: "27_strong_crosswind"
    duration_minutes: 240
    reason: Santa Ana crosswind component exceeds limits for small aircraft

ground_events:
  - time: "05:00"
    type: gate_failure
    target: "Terminal 2-34"
    duration_hours: 3.0

  - time: "14:00"
    type: taxiway_closure
    target: "Taxiway B (wind debris)"
    duration_hours: 3.0
    impact:
      turnaround_multiplier: 1.3

traffic_modifiers:
  - time: "05:00"
    type: surge
    extra_arrivals: 4
    extra_departures: 2

  - time: "14:00"
    type: diversion
    extra_arrivals: 4
    diversion_origin: LAX
