name: ATL Summer Severe Thunderstorm — US Southeast
description: >
  Intense summer afternoon convection rolls through Atlanta. A line of severe
  thunderstorms produces wind shear, flash flooding on the ramp, and frequent
  lightning forcing ramp closures. Hartsfield-Jackson's massive hub operation
  cascades delays across the US network. Realistic for Jun-Aug afternoon storms.

weather_events:
  - time: "13:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 3.0
    ceiling_ft: 2500
    wind_speed_kt: 20
    wind_gusts_kt: 35
    wind_direction: 240

  - time: "14:30"
    type: thunderstorm
    severity: severe
    duration_hours: 2.5
    visibility_nm: 0.5
    ceiling_ft: 500
    wind_speed_kt: 40
    wind_gusts_kt: 62
    wind_direction: 260

  - time: "17:00"
    type: thunderstorm
    severity: moderate
    duration_hours: 1.5
    visibility_nm: 2.0
    ceiling_ft: 1500
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 270

  - time: "18:30"
    type: rain
    severity: light
    duration_hours: 2.0
    visibility_nm: 5.0
    ceiling_ft: 3000
    wind_speed_kt: 15
    wind_direction: 280

  - time: "20:30"
    type: clear
    severity: light
    duration_hours: 3.5
    visibility_nm: 10.0
    ceiling_ft: 5000
    wind_speed_kt: 8
    wind_direction: 290

runway_events:
  - time: "14:30"
    type: closure
    runway: "26L"
    duration_minutes: 120
    reason: Severe thunderstorm — wind shear alerts on approach

  - time: "15:00"
    type: closure
    runway: "27R"
    duration_minutes: 90
    reason: Lightning within 3nm — all ops suspended

ground_events:
  - time: "14:00"
    type: gate_failure
    target: "T-N-A12"
    duration_hours: 3.0

  - time: "14:30"
    type: taxiway_closure
    target: "Taxiway L (flash flooding)"
    duration_hours: 4.0
    impact:
      turnaround_multiplier: 1.5

  - time: "15:00"
    type: gate_failure
    target: "Concourse D-22"
    duration_hours: 2.5

traffic_modifiers:
  - time: "13:00"
    type: surge
    extra_arrivals: 8
    extra_departures: 6

  - time: "15:00"
    type: ground_stop
    duration_hours: 2.0

  - time: "17:30"
    type: diversion
    extra_arrivals: 12
    diversion_origin: CLT
