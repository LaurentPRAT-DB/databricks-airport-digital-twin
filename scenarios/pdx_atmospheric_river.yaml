name: PDX Atmospheric River — Pacific Northwest
description: >
  Pineapple Express atmospheric river makes landfall in Oregon.
  Persistent heavy rain with embedded thunderstorms. Ceilings
  hover near minimums for hours. River flooding threatens
  ground access. Realistic for Nov-Mar.

weather_events:
  - time: "02:00"
    type: rain
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 2.0
    ceiling_ft: 600
    wind_speed_kt: 20
    wind_gusts_kt: 32
    wind_direction: 180

  - time: "06:00"
    type: rain
    severity: severe
    duration_hours: 6.0
    visibility_nm: 0.5
    ceiling_ft: 200
    wind_speed_kt: 30
    wind_gusts_kt: 48
    wind_direction: 190

  - time: "12:00"
    type: rain
    severity: moderate
    duration_hours: 4.0
    visibility_nm: 1.5
    ceiling_ft: 500
    wind_speed_kt: 25
    wind_gusts_kt: 40
    wind_direction: 200

  - time: "16:00"
    type: rain
    severity: light
    duration_hours: 4.0
    visibility_nm: 3.0
    ceiling_ft: 1500
    wind_speed_kt: 18
    wind_direction: 210

  - time: "20:00"
    type: clear
    severity: light
    duration_hours: 4.0
    visibility_nm: 8.0
    ceiling_ft: 4000
    wind_speed_kt: 10
    wind_direction: 220

runway_events:
  - time: "06:00"
    type: closure
    runway: "10R"
    duration_minutes: 240
    reason: Visibility below minimums — ILS approach only

  - time: "08:00"
    type: closure
    runway: "10L"
    duration_minutes: 180
    reason: Standing water — hydroplaning risk

ground_events:
  - time: "06:00"
    type: taxiway_closure
    target: "Taxiway C (flooding)"
    duration_hours: 8.0
    impact:
      turnaround_multiplier: 1.5

  - time: "09:00"
    type: gate_failure
    target: "Concourse D-8"
    duration_hours: 4.0

traffic_modifiers:
  - time: "06:00"
    type: surge
    extra_arrivals: 4
    extra_departures: 2

  - time: "10:00"
    type: diversion
    extra_arrivals: 6
    diversion_origin: SEA
