<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Offline — Airport Digital Twin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { background: #2563eb; }
  </style>
</head>
<body>
  <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01" />
  </svg>
  <h1>You're Offline</h1>
  <p>Airport Digital Twin requires a network connection for real-time flight data. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Retry</button>
</body>
</html>
