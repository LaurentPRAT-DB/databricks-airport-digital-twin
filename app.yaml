command:
  - "uvicorn"
  - "app.backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--log-level"
  - "info"

env:
  # Debug mode — set to "true" only for local troubleshooting
  - name: DEBUG_MODE
    value: "false"

  # Demo mode configuration
  - name: DEMO_MODE
    value: "true"
  - name: DEMO_DEFAULT_AIRPORT
    value: "KSFO"
  - name: DEMO_FLIGHT_COUNT
    value: "100"

  # Data source configuration (USE_MOCK_BACKEND is implied by DEMO_MODE)
  - name: USE_MOCK_BACKEND
    value: "true"

  # Databricks SQL (Delta tables)
  - name: DATABRICKS_HOST
    value: "fevm-serverless-stable-3n0ihb.cloud.databricks.com"
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/b868e84cedeb4262"
  - name: DATABRICKS_CATALOG
    value: "serverless_stable_3n0ihb_catalog"
  - name: DATABRICKS_SCHEMA
    value: "airport_digital_twin"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "b868e84cedeb4262"
  - name: DATABRICKS_USE_OAUTH
    value: "true"

  # Lakebase Autoscaling PostgreSQL
  - name: LAKEBASE_HOST
    value: "ep-summer-scene-d2ew95fl.database.us-east-1.cloud.databricks.com"
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_DATABASE
    value: "databricks_postgres"
  - name: LAKEBASE_SCHEMA
    value: "public"
  - name: LAKEBASE_ENDPOINT_NAME
    value: "projects/airport-digital-twin/branches/production/endpoints/primary"
  - name: LAKEBASE_USE_OAUTH
    value: "true"

  # Genie Space for Airport Operations Assistant
  - name: GENIE_SPACE_ID
    value: "01f12612fa6314ae943d0526f5ae3a00"
