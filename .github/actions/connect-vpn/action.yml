name: "Connect GlobalProtect VPN"
description: "Establishes a GlobalProtect VPN tunnel using openconnect"

inputs:
  portal:
    description: "GlobalProtect portal address (e.g. vpn.corp.databricks.com)"
    required: true
  username:
    description: "VPN username"
    required: true
  password:
    description: "VPN password or SAML preauth cookie"
    required: true
  gateway:
    description: "Specific gateway to use (optional — auto-selects nearest if blank)"
    required: false
    default: ""
  auth-method:
    description: "Auth method: password, totp, or saml-cookie"
    required: false
    default: "password"
  totp-secret:
    description: "TOTP secret for MFA code generation (only when auth-method=totp)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install openconnect
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openconnect

    - name: Install TOTP tools (if needed)
      if: inputs.auth-method == 'totp'
      shell: bash
      run: sudo apt-get install -y -qq oathtool

    - name: Connect to GlobalProtect VPN
      shell: bash
      env:
        VPN_PORTAL: ${{ inputs.portal }}
        VPN_USER: ${{ inputs.username }}
        VPN_PASS: ${{ inputs.password }}
        VPN_GATEWAY: ${{ inputs.gateway }}
        VPN_AUTH: ${{ inputs.auth-method }}
        VPN_TOTP_SECRET: ${{ inputs.totp-secret }}
      run: |
        GATEWAY_OPT=""
        if [[ -n "$VPN_GATEWAY" ]]; then
          GATEWAY_OPT="--server=$VPN_GATEWAY"
        fi

        # Build password input based on auth method
        if [[ "$VPN_AUTH" == "totp" && -n "$VPN_TOTP_SECRET" ]]; then
          TOTP_CODE=$(oathtool --totp -b "$VPN_TOTP_SECRET")
          AUTH_INPUT="${VPN_PASS}\n${TOTP_CODE}"
        else
          AUTH_INPUT="$VPN_PASS"
        fi

        echo -e "$AUTH_INPUT" | sudo openconnect \
          --protocol=gp \
          --user="$VPN_USER" \
          $GATEWAY_OPT \
          --passwd-on-stdin \
          --background \
          --pid-file=/tmp/vpn.pid \
          "$VPN_PORTAL" 2>&1 | tail -5

        # Wait for tunnel interface
        echo "Waiting for VPN tunnel..."
        for i in $(seq 1 30); do
          if ip addr show tun0 > /dev/null 2>&1; then
            echo "VPN connected (tun0 up after ${i}x2s)"
            exit 0
          fi
          sleep 2
        done

        echo "ERROR: VPN tunnel not established after 60s"
        cat /tmp/vpn.pid 2>/dev/null && sudo journalctl -u openconnect --no-pager -n 20 2>/dev/null || true
        exit 1

    - name: Verify VPN connectivity
      shell: bash
      run: |
        echo "VPN tunnel IP:"
        ip addr show tun0 | grep inet
        echo "Route table (VPN entries):"
        ip route | grep tun0 | head -5
