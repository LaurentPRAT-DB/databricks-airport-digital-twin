name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --extra dev --extra formats

      - name: Run Python tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_live_trajectory_quality.py \
            --ignore=tests/test_airport_activation.py \
            --ignore=tests/test_aviation_procedures.py \
            --ignore=tests/test_flight_ops_validation.py \
            --ignore=tests/test_expert_reviews.py \
            --ignore=tests/test_multi_airport_ux.py \
            -q --tb=short \
            --override-ini="asyncio_mode=auto"

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('app/frontend/package-lock.json') }}

      - name: Install dependencies
        working-directory: app/frontend
        timeout-minutes: 15
        run: |
          pnpm import
          pnpm install --no-frozen-lockfile --shamefully-hoist --strict-peer-dependencies=false
          test -x node_modules/.bin/vitest || { echo "::error::vitest binary missing"; exit 1; }

      - name: Run tests
        working-directory: app/frontend
        run: npx vitest run

      - name: TypeScript check
        working-directory: app/frontend
        run: npx tsc --noEmit
