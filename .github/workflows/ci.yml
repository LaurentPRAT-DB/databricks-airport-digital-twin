name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --extra dev --extra formats

      - name: Run Python tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_live_trajectory_quality.py \
            --ignore=tests/test_airport_activation.py \
            --ignore=tests/test_aviation_procedures.py \
            --ignore=tests/test_flight_ops_validation.py \
            --ignore=tests/test_expert_reviews.py \
            --ignore=tests/test_multi_airport_ux.py \
            -q --tb=short \
            --override-ini="asyncio_mode=auto"

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: app/frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('app/frontend/package-lock.json') }}
          save-always: true

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        working-directory: app/frontend
        timeout-minutes: 15
        run: |
          rm -rf node_modules
          for attempt in 1 2 3; do
            echo "::group::npm ci attempt $attempt"
            npm ci --legacy-peer-deps && break
            echo "::endgroup::"
            echo "::warning::npm ci attempt $attempt failed, retrying..."
            rm -rf node_modules
            sleep 5
          done
          echo "::endgroup::"
          test -d node_modules/vitest || { echo "::error::npm ci failed after 3 attempts"; exit 1; }

      - name: Run tests
        working-directory: app/frontend
        run: npm run test:run

      - name: TypeScript check
        working-directory: app/frontend
        run: npx tsc --noEmit
