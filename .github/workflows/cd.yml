name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target (dev or prod)"
        type: choice
        options:
          - prod
          - dev
        default: prod
      seed:
        description: "Seed data (first-time deploy: uploads calibration profiles, 3D models, Lakebase schema)"
        type: boolean
        default: false

concurrency:
  group: cd-deploy
  cancel-in-progress: false

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  TARGET: ${{ github.event.inputs.target || 'prod' }}

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 20
    outputs:
      app-url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - uses: actions/checkout@v4

      # ── Auth pre-task (configurable per target) ──────────────────
      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      # ── Standard setup ──────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify auth
        run: databricks auth env

      - name: Build frontend
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Deploy via DABs
        id: deploy
        run: |
          chmod +x scripts/ci-deploy.sh
          SEED_FLAG=""
          if [[ "${{ github.event.inputs.seed }}" == "true" ]]; then
            SEED_FLAG="--seed"
          fi
          scripts/ci-deploy.sh --target "$TARGET" $SEED_FLAG
        env:
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          LAKEBASE_HOST: ${{ secrets.LAKEBASE_HOST }}
          LAKEBASE_ENDPOINT_NAME: ${{ secrets.LAKEBASE_ENDPOINT_NAME }}
          GENIE_SPACE_ID: ${{ secrets.GENIE_SPACE_ID }}
          SECRET_SCOPE: ${{ secrets.SECRET_SCOPE }}

      # ── Cleanup ─────────────────────────────────────────────────
      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
            echo "VPN disconnected"
          fi

  post-deploy-tests:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: deploy
    timeout-minutes: 10
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      - name: Wait for app readiness
        run: |
          APP_URL="${{ needs.deploy.outputs.app-url }}"
          echo "Waiting for app to be ready at $APP_URL..."
          for i in $(seq 1 20); do
            if curl -s "$APP_URL/api/ready" | jq -e '.ready == true' > /dev/null 2>&1; then
              echo "App is ready after ${i}0s"
              break
            fi
            sleep 10
          done

      - name: Run post-deploy verification
        id: verify
        continue-on-error: true
        run: |
          chmod +x scripts/verify-prod.sh
          scripts/verify-prod.sh "${{ needs.deploy.outputs.app-url }}"

      - name: Alert on failure
        if: steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## Post-Deploy Verification Failed\n\n`;
            body += `**Commit:** ${context.sha.substring(0, 7)}\n`;
            body += `**Branch:** main\n`;
            body += `**App URL:** ${{ needs.deploy.outputs.app-url }}\n`;
            body += `**Run:** [${context.runId}](${runUrl})\n\n`;
            body += `The deployment to **prod** completed but post-deploy endpoint verification failed.\n`;
            body += `Check the workflow logs for which endpoints are down.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[deploy-failure] Post-deploy verification failed (${context.sha.substring(0, 7)})`,
              body: body,
              labels: ['deploy-failure']
            });

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          echo "Post-deploy verification failed. See GitHub Issue for details."
          exit 1

      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
          fi
