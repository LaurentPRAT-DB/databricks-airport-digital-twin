name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        type: choice
        options:
          - prod
          - dev
          - free
        default: prod
      brand:
        description: "Frontend brand (logo + default airport)"
        type: choice
        options:
          - databricks
          - aia.gr
          - sita.aero
        default: databricks
      seed:
        description: "Seed data (first-time deploy: uploads calibration profiles, 3D models, Lakebase schema)"
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.event.inputs.target || 'prod' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  TARGET: ${{ github.event.inputs.target || 'prod' }}
  BRAND: ${{ github.event.inputs.brand || 'databricks' }}

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: ${{ github.event.inputs.target || 'prod' }}
    timeout-minutes: 30
    outputs:
      app-url: ${{ steps.deploy.outputs.app_url }}
      git-commit: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auth pre-task (configurable per target) ──────────────────
      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      # ── Standard setup (skipped on self-hosted — tools pre-installed) ──
      - uses: actions/setup-python@v5
        if: runner.environment == 'github-hosted'
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v4
        if: runner.environment == 'github-hosted'
        with:
          version: "latest"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        env:
          RUNNER_TOOL_CACHE: /tmp/runner-tool-cache

      - name: Install Python dependencies
        run: uv sync --extra deploy
        env:
          UV_INDEX_URL: ${{ runner.environment == 'github-hosted' && 'https://pypi.org/simple/' || '' }}

      - name: Install Databricks CLI
        if: runner.environment == 'github-hosted'
        uses: databricks/setup-cli@main

      - name: Verify auth
        run: databricks auth env

      - name: Capture build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: app/frontend
        env:
          npm_config_registry: ${{ runner.environment == 'github-hosted' && 'https://registry.npmjs.org/' || 'https://npm-proxy.dev.databricks.com/' }}
        run: |
          rm -rf node_modules
          npm ci --no-audit --no-fund
          test -d node_modules/typescript || { echo "::error::npm install failed — typescript not installed"; exit 1; }

      - name: Build frontend
        working-directory: app/frontend
        env:
          VITE_BRAND: ${{ github.event.inputs.brand || 'databricks' }}
        run: |
          BRAND="${VITE_BRAND}"
          BRAND_DIR="brands/${BRAND}"
          if [[ -f "${BRAND_DIR}/logo.svg" ]]; then
            cp "${BRAND_DIR}/logo.svg" public/company-logo.svg
          fi
          ./node_modules/.bin/tsc && ./node_modules/.bin/vite build

      - name: Deploy via DABs
        id: deploy
        run: |
          chmod +x scripts/ci-deploy.sh
          SEED_FLAG=""
          if [[ "${{ github.event.inputs.seed }}" == "true" ]]; then
            SEED_FLAG="--seed"
          fi
          scripts/ci-deploy.sh --target "$TARGET" $SEED_FLAG
        env:
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          LAKEBASE_HOST: ${{ secrets.LAKEBASE_HOST }}
          LAKEBASE_ENDPOINT_NAME: ${{ secrets.LAKEBASE_ENDPOINT_NAME }}
          GENIE_SPACE_ID: ${{ secrets.GENIE_SPACE_ID }}
          SECRET_SCOPE: ${{ secrets.SECRET_SCOPE }}

      # ── Cleanup ─────────────────────────────────────────────────
      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
            echo "VPN disconnected"
          fi

  post-deploy-tests:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: deploy
    timeout-minutes: 10
    if: success()
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      - name: Wait for app readiness
        env:
          DATABRICKS_CONFIG_PROFILE: ""
        run: |
          APP_URL="${{ needs.deploy.outputs.app-url }}"
          TOKEN=$(databricks auth token 2>/dev/null | jq -r '.access_token // empty' || true)
          echo "Waiting for app to be ready at $APP_URL..."
          echo "Token length: ${#TOKEN}"
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$APP_URL/api/ready" || true)
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if curl -s -H "Authorization: Bearer $TOKEN" "$APP_URL/api/ready" | jq -e '.ready == true' > /dev/null 2>&1; then
              echo "App is ready after ${i}0s"
              break
            fi
            sleep 10
          done

      - name: Log expected build
        run: |
          echo "Expected commit: ${{ needs.deploy.outputs.git-commit }}"
          echo "Expected build:  $(git rev-list --count HEAD)"

      - name: Run post-deploy verification
        id: verify
        continue-on-error: true
        env:
          DATABRICKS_CONFIG_PROFILE: ""
        run: |
          chmod +x scripts/verify-prod.sh
          scripts/verify-prod.sh "${{ needs.deploy.outputs.app-url }}"

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::error::Post-deploy verification failed. Check the 'Run post-deploy verification' step for details."
          exit 1

      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
          fi
