name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        type: choice
        options:
          - dev
          - prod
          - free
        default: dev
      brand:
        description: "Frontend brand (logo + default airport)"
        type: choice
        options:
          - databricks
          - aia.gr
          - sita.aero
        default: databricks
      seed:
        description: "Seed data (first-time deploy: uploads calibration profiles, 3D models, Lakebase schema)"
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.event.inputs.target || 'dev' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  DATABRICKS_AUTH_TYPE: pat
  DATABRICKS_CONFIG_PROFILE: ""
  TARGET: ${{ github.event.inputs.target || 'dev' }}
  BRAND: ${{ github.event.inputs.brand || 'databricks' }}

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: ${{ github.event.inputs.target || 'dev' }}
    timeout-minutes: 30
    outputs:
      app-url: ${{ steps.deploy.outputs.app_url }}
      git-commit: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Auth pre-task (configurable per target) ──────────────────
      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      # ── Standard setup (skipped on self-hosted — tools pre-installed) ──
      - uses: actions/setup-python@v5
        if: runner.environment == 'github-hosted'
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v4
        if: runner.environment == 'github-hosted'
        with:
          version: "latest"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        env:
          RUNNER_TOOL_CACHE: /tmp/runner-tool-cache

      - name: Install Python dependencies
        run: uv sync --extra deploy
        env:
          UV_INDEX_URL: ${{ runner.environment == 'github-hosted' && 'https://pypi.org/simple/' || '' }}

      - name: Install Databricks CLI
        if: runner.environment == 'github-hosted'
        uses: databricks/setup-cli@main

      - name: Verify auth
        run: databricks auth env

      - name: Capture build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Detect frontend changes
        id: frontend-changes
        run: |
          # Skip build if the triggering commit didn't touch frontend files.
          # For workflow_run: check only the single triggering commit (not history window).
          # For manual dispatch: always build unless SKIP_BUILD requested.
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
            CHANGES=$(git diff-tree --no-commit-id --name-only -r "$TRIGGER_SHA" -- app/frontend/ | grep -c . || true)
          else
            CHANGES="1"  # Manual dispatch = always build
          fi
          if [[ "$CHANGES" == "0" ]]; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend changes in commit $TRIGGER_SHA — using existing dist/"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache node_modules
        if: steps.frontend-changes.outputs.skip_build != 'true' && runner.environment == 'github-hosted'
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: app/frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('app/frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.frontend-changes.outputs.skip_build != 'true'
        working-directory: app/frontend
        env:
          npm_config_registry: ${{ runner.environment == 'github-hosted' && 'https://registry.npmjs.org/' || 'https://npm-proxy.dev.databricks.com/' }}
          NPM_PERSISTENT_CACHE: /tmp/npm-node-modules-airport
        run: |
          # On self-hosted: restore from persistent cache (survives checkout clean)
          if [[ "${{ runner.environment }}" != "github-hosted" && -d "$NPM_PERSISTENT_CACHE/typescript" ]]; then
            cp -a "$NPM_PERSISTENT_CACHE" node_modules
            echo "::notice::Self-hosted runner — restored node_modules from persistent cache"
          elif [[ "${{ steps.npm-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "::notice::Cache hit — skipping npm install"
          else
            rm -rf node_modules
            for attempt in 1 2 3; do
              timeout 120 npm install --no-audit --no-fund --legacy-peer-deps && break
              echo "::warning::npm install attempt $attempt failed (exit $?), retrying in 10s..."
              sleep 10
            done
            test -d node_modules/typescript || { echo "::error::npm install failed — typescript not installed"; exit 1; }
          fi
          # Persist for next run (self-hosted only, survives checkout@v4 clean)
          if [[ "${{ runner.environment }}" != "github-hosted" && -d node_modules/typescript ]]; then
            rm -rf "$NPM_PERSISTENT_CACHE"
            cp -a node_modules "$NPM_PERSISTENT_CACHE"
          fi

      - name: Build frontend
        if: steps.frontend-changes.outputs.skip_build != 'true'
        working-directory: app/frontend
        env:
          VITE_BRAND: ${{ github.event.inputs.brand || 'databricks' }}
        run: |
          BRAND="${VITE_BRAND}"
          BRAND_DIR="brands/${BRAND}"
          if [[ -f "${BRAND_DIR}/logo.svg" ]]; then
            cp "${BRAND_DIR}/logo.svg" public/company-logo.svg
          fi
          ./node_modules/.bin/tsc && ./node_modules/.bin/vite build

      - name: Deploy via DABs
        id: deploy
        run: |
          chmod +x scripts/ci-deploy.sh
          SEED_FLAG=""
          if [[ "${{ github.event.inputs.seed }}" == "true" ]]; then
            SEED_FLAG="--seed"
          fi
          scripts/ci-deploy.sh --target "$TARGET" $SEED_FLAG
        env:
          SKIP_BUILD: ${{ steps.frontend-changes.outputs.skip_build == 'true' && '1' || '' }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          LAKEBASE_HOST: ${{ secrets.LAKEBASE_HOST }}
          LAKEBASE_ENDPOINT_NAME: ${{ secrets.LAKEBASE_ENDPOINT_NAME }}
          GENIE_SPACE_ID: ${{ secrets.GENIE_SPACE_ID }}
          SECRET_SCOPE: ${{ secrets.SECRET_SCOPE }}

      # ── Cleanup ─────────────────────────────────────────────────
      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
            echo "VPN disconnected"
          fi

  post-deploy-tests:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: deploy
    timeout-minutes: 10
    if: success()
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Connect VPN
        if: vars.REQUIRES_VPN == 'true'
        uses: ./.github/actions/connect-vpn
        with:
          portal: ${{ vars.VPN_PORTAL }}
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
          gateway: ${{ vars.VPN_GATEWAY }}
          auth-method: ${{ vars.VPN_AUTH_METHOD || 'password' }}
          totp-secret: ${{ secrets.VPN_TOTP_SECRET }}

      - name: Wait for app readiness
        run: |
          APP_URL="${{ needs.deploy.outputs.app-url }}"
          # OAuth M2M token — Databricks Apps require OAuth, not PAT
          TOKEN=$(curl -s -X POST "${DATABRICKS_HOST}/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${DATABRICKS_CLIENT_ID}&client_secret=${DATABRICKS_CLIENT_SECRET}&scope=all-apis" \
            | jq -r '.access_token // empty' || true)
          echo "Waiting for app to be ready at $APP_URL..."
          echo "Token length: ${#TOKEN}"
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$APP_URL/api/ready" || true)
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if curl -s -H "Authorization: Bearer $TOKEN" "$APP_URL/api/ready" | jq -e '.ready == true' > /dev/null 2>&1; then
              echo "App is ready after ${i}0s"
              break
            fi
            sleep 10
          done

      - name: Log expected build
        run: |
          echo "Expected commit: ${{ needs.deploy.outputs.git-commit }}"
          echo "Expected build:  $(git rev-list --count HEAD)"

      - name: Run post-deploy verification
        id: verify
        continue-on-error: true
        run: |
          chmod +x scripts/verify-prod.sh
          scripts/verify-prod.sh "${{ needs.deploy.outputs.app-url }}"

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::error::Post-deploy verification failed. Check the 'Run post-deploy verification' step for details."
          exit 1

      - name: Disconnect VPN
        if: always() && vars.REQUIRES_VPN == 'true'
        run: |
          if [[ -f /tmp/vpn.pid ]]; then
            sudo kill "$(cat /tmp/vpn.pid)" 2>/dev/null || true
          fi
