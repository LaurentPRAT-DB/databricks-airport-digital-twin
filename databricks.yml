bundle:
  name: airport-digital-twin

sync:
  include:
    - app/**
    - app/frontend/dist/**
    - src/**
    - tests/**
    - config/**
    - configs/**
    - scenarios/**
    # simulation_output/** excluded — served from UC Volume in production
    # data/calibration/profiles/** and data/demo/** excluded — same
    - app.yaml
    - requirements.txt
    - pyproject.toml
    - databricks/**
    - resources/**
    - BUILD_NUMBER
    - GIT_COMMIT
  exclude:
    - node_modules/**
    - "*.pyc"
    - __pycache__/**
    - .venv/**
    - .git/**
    - .planning/**
    - .databricks/**
    - screenshots/**
    - simulation_output/**
    - configs/calibration_batch/**
    - data/fallback/**
    - data/calibration/raw/**
    - data/calibration/download_manual/**
    - data/ml_models/**
    - data/msfs_bgl/**
    - tests/output/**
    - reports/**
    # Large 3D models that aren't used in the app
    - app/frontend/dist/models/aircraft/free_-_fighter_jet_collection_-_low_poly.glb
    - app/frontend/src/**
    - app/frontend/coverage/**
    - app/frontend/public/**
    - app/frontend/e2e/**
    - app/frontend/tests/**
    - app/frontend/test-results/**
    - app/frontend/scripts/**
    - app/frontend/*.config.*
    - app/frontend/tsconfig.*
    - app/frontend/package-lock.json

include:
  - resources/*.yml

variables:
  catalog:
    default: "airport_digital_twin"
  schema:
    default: "airport_digital_twin"
  warehouse_id:
    description: "SQL Warehouse ID for the app"
    default: ""
  lakebase_branch:
    description: "Lakebase branch name for environment isolation"
    default: "dev"
  lakebase_host:
    description: "Lakebase endpoint host for the target branch"
    default: "ep-polished-forest-d2hjnab6.database.us-east-1.cloud.databricks.com"
  inpainting_endpoint_name:
    description: "Inpainting model serving endpoint name (empty to disable)"
    default: ""

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: FEVM_SERVERLESS_STABLE
    resources:
      apps:
        airport_digital_twin:
          resources:
            - name: inpainting-endpoint
              serving_endpoint:
                name: airport-dt-aircraft-inpainting-dev
                permission: CAN_QUERY
    variables:
      catalog: "serverless_stable_3n0ihb_catalog"
      schema: "airport_digital_twin"
      warehouse_id: "b868e84cedeb4262"
      lakebase_branch: "dev"
      lakebase_host: "ep-polished-forest-d2hjnab6.database.us-east-1.cloud.databricks.com"
      inpainting_endpoint_name: "airport-dt-aircraft-inpainting-dev"

  prod:
    workspace:
      profile: FEVM_SERVERLESS_STABLE
    variables:
      catalog: "serverless_stable_3n0ihb_catalog"
      schema: "airport_digital_twin_prod"
      warehouse_id: "b868e84cedeb4262"
      lakebase_branch: "production"
      lakebase_host: "ep-summer-scene-d2ew95fl.database.us-east-1.cloud.databricks.com"
      inpainting_endpoint_name: "airport-dt-aircraft-inpainting-prod"

  free:
    mode: development
    workspace:
      profile: LPT_FREE_EDITION
    variables:
      catalog: "main"
      schema: "airport_digital_twin"
      warehouse_id: "58d41113cb262dce"
      lakebase_branch: "production"
      lakebase_host: "ep-patient-fire-d38b447d.database.eu-west-1.cloud.databricks.com"
      inpainting_endpoint_name: ""
