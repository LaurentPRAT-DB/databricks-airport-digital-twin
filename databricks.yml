bundle:
  name: airport-digital-twin

sync:
  include:
    - app/**
    - src/**
    - tests/**
    - config/**
    - configs/**
    - scenarios/**
    - simulation_output/report/**
    - data/calibration/profiles/**
    - app.yaml
    - requirements.txt
    - pyproject.toml
    - databricks/**
    - resources/**
  exclude:
    - node_modules/**
    - "*.pyc"
    - __pycache__/**
    - .venv/**
    - .git/**
    - .planning/**
    - .databricks/**
    - screenshots/**
    - simulation_output*.json
    - simulation_output/*.json
    - simulation_output/calibrated/**
    - configs/calibration_batch/**
    - data/fallback/**
    - data/calibration/raw/**
    - data/calibration/download_manual/**
    - data/ml_models/**
    - data/msfs_bgl/**
    # Frontend: only dist/ is needed at runtime (3D models served from UC Volumes)
    - app/frontend/dist/models/**
    - app/frontend/src/**
    - app/frontend/coverage/**
    - app/frontend/public/**
    - app/frontend/e2e/**
    - app/frontend/tests/**
    - app/frontend/test-results/**
    - app/frontend/scripts/**
    - app/frontend/*.config.*
    - app/frontend/tsconfig.*
    - app/frontend/package-lock.json

include:
  - resources/*.yml

variables:
  catalog:
    default: "airport_digital_twin"
  schema:
    default: "default"
  warehouse_id:
    description: "SQL Warehouse ID for the app"
    default: ""

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: FEVM_SERVERLESS_STABLE
    variables:
      catalog: "serverless_stable_3n0ihb_catalog"
      schema: "airport_digital_twin"
